<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 210 52" width="210" height="52">
  <defs>
    <linearGradient id="iconGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#c2440a"/>
    </linearGradient>
  </defs>

  <!-- Icon: rounded square background -->
  <rect width="52" height="52" rx="13" fill="url(#iconGrad)"/>

  <!-- Code brackets: < / > -->
  <polyline points="19,14 10,26 19,38"
    fill="none" stroke="white" stroke-width="3"
    stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="25" y1="38" x2="31" y2="14"
    stroke="rgba(255,255,255,0.65)" stroke-width="2.5" stroke-linecap="round"/>
  <polyline points="33,14 42,26 33,38"
    fill="none" stroke="white" stroke-width="3"
    stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Wordmark -->
  <text x="64" y="26"
    font-family="'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="22" font-weight="700">
    <tspan fill="#1a1008">Code</tspan><tspan fill="#f97316">MS</tspan>
  </text>

  <!-- Tagline -->
  <text x="64" y="41"
    font-family="'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="11" font-weight="500" fill="#9c8272" letter-spacing="0.3">
    Code Management System
  </text>
</svg>
